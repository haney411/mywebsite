<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music | Paul Haney</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Banner (matches index.html) ── */
    .banner {
      background-color: #333;
      color: #fff;
      padding: 10px;
    }
    .banner ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: space-between;
    }
    .banner li { margin-right: 20px; }
    .banner li a {
      color: #fff;
      text-decoration: none;
      font-size: 28px;
    }
    .banner li a:hover { color: #aaa; }

    /* ── Page layout ── */
    .page {
      display: flex;
      gap: 0;
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
      align-items: flex-start;
    }

    /* ── Track list ── */
    .track-list-section {
      flex: 1;
      min-width: 220px;
      max-width: 320px;
    }

    .track-list-section h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
      margin-bottom: 12px;
    }

    .track-list {
      list-style: none;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .track-list li {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #2a2a2a;
      font-size: 15px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .track-list li:last-child { border-bottom: none; }

    .track-list li:hover { background: #2a2a2a; }

    .track-list li.active {
      background: #2e2e4a;
      color: #a0a0ff;
    }

    .track-num {
      color: #555;
      font-size: 12px;
      min-width: 20px;
      text-align: right;
    }

    .track-list li.active .track-num { color: #7070cc; }

    /* ── Player section ── */
    .player-section {
      flex: 2;
      padding-left: 40px;
    }

    .player-card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 28px 28px 24px;
    }

    .now-playing-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 6px;
    }

    .track-title {
      font-size: 22px;
      font-weight: 600;
      color: #f0f0f0;
      margin-bottom: 22px;
      min-height: 30px;
    }

    /* ── A/B Toggle ── */
    .ab-toggle-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .ab-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
    }

    .ab-toggle {
      display: flex;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      overflow: hidden;
    }

    .ab-btn {
      padding: 7px 22px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #666;
      transition: background 0.15s, color 0.15s;
    }

    .ab-btn:disabled {
      cursor: default;
      opacity: 0.35;
    }

    .ab-btn.selected {
      background: #3a3a6a;
      color: #a0a0ff;
    }

    .ab-hint {
      font-size: 12px;
      color: #555;
      font-style: italic;
    }

    /* ── Progress bar ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .time {
      font-size: 12px;
      color: #666;
      min-width: 38px;
      font-variant-numeric: tabular-nums;
    }

    .time.end { text-align: right; }

    .seek-bar {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #444;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }

    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #a0a0ff;
      cursor: pointer;
      margin-top: -5px;
    }

    .seek-bar::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 2px;
    }

    /* ── Transport controls ── */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover { color: #fff; background: #333; }

    .ctrl-btn:disabled { opacity: 0.3; cursor: default; }
    .ctrl-btn:disabled:hover { color: #aaa; background: none; }

    .play-btn {
      width: 52px;
      height: 52px;
      background: #3a3a6a !important;
      border-radius: 50%;
      color: #c0c0ff;
    }

    .play-btn:hover {
      background: #4a4a8a !important;
      color: #fff;
    }

    /* ── Volume ── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vol-icon { color: #666; font-size: 14px; }

    .vol-slider {
      width: 90px;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: #444;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #777;
      cursor: pointer;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="banner">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="music.html">Music</a></li>
      <li><a href="pictures.html">Pictures</a></li>
      <li><a href="physics.html">Physics</a></li>
      <li><a href="miscellaneous.html">Miscellaneous</a></li>
    </ul>
  </div>

  <div class="page">

    <!-- Track list -->
    <div class="track-list-section">
      <h2>Tracks</h2>
      <ul class="track-list" id="trackList"></ul>
    </div>

    <!-- Player -->
    <div class="player-section">
      <div class="player-card">
        <div class="now-playing-label">Now Playing</div>
        <div class="track-title" id="trackTitle">
          <span class="empty-state">Select a track to begin</span>
        </div>

        <!-- A/B version toggle -->
        <div class="ab-toggle-row">
          <span class="ab-label">Version</span>
          <div class="ab-toggle">
            <button class="ab-btn selected" id="btnA" onclick="switchVersion('a')" disabled>A</button>
            <button class="ab-btn"          id="btnB" onclick="switchVersion('b')" disabled>B</button>
          </div>
          <span class="ab-hint" id="abHint">load a track to compare versions</span>
        </div>

        <!-- Seek bar -->
        <div class="progress-row">
          <span class="time" id="timeCurrent">0:00</span>
          <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0" step="0.1"
                 oninput="onSeekInput(this.value)" onchange="onSeekChange(this.value)" disabled>
          <span class="time end" id="timeDuration">0:00</span>
        </div>

        <!-- Transport -->
        <div class="controls-row">
          <button class="ctrl-btn" id="btnPrev" onclick="prevTrack()" title="Previous" disabled>
            <!-- Prev icon -->
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6V6zm3.5 6 8.5 6V6L9.5 12z"/>
            </svg>
          </button>
          <button class="ctrl-btn play-btn" id="btnPlay" onclick="togglePlay()" title="Play / Pause" disabled>
            <!-- Play icon (swapped to pause when playing) -->
            <svg id="iconPlay" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="iconPause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btnNext" onclick="nextTrack()" title="Next" disabled>
            <!-- Next icon -->
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zm2.5-6L12 9.5V14l-3.5-2zM16 6h2v12h-2V6z"/>
            </svg>
          </button>
        </div>

        <!-- Volume -->
        <div class="volume-row">
          <svg class="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02"
                 value="0.8" oninput="setVolume(this.value)">
        </div>

      </div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // TRACK LIBRARY
    // Fill in your actual file paths and titles below.
    // Audio files go in the "audio/" folder next to this HTML file.
    // Each track needs two versions: "a" and "b".
    // Supported formats: .mp3  .ogg  .wav  .flac  .aac
    // ─────────────────────────────────────────────────────────────────────────
    const tracks = [
      { title: "Track 1",  a: "audio/track01-a.mp3", b: "audio/track01-b.mp3" },
      { title: "Track 2",  a: "audio/track02-a.mp3", b: "audio/track02-b.mp3" },
      { title: "Track 3",  a: "audio/track03-a.mp3", b: "audio/track03-b.mp3" },
      { title: "Track 4",  a: "audio/track04-a.mp3", b: "audio/track04-b.mp3" },
      { title: "Track 5",  a: "audio/track05-a.mp3", b: "audio/track05-b.mp3" },
      { title: "Track 6",  a: "audio/track06-a.mp3", b: "audio/track06-b.mp3" },
      { title: "Track 7",  a: "audio/track07-a.mp3", b: "audio/track07-b.mp3" },
      { title: "Track 8",  a: "audio/track08-a.mp3", b: "audio/track08-b.mp3" },
      { title: "Track 9",  a: "audio/track09-a.mp3", b: "audio/track09-b.mp3" },
      { title: "Track 10", a: "audio/track10-a.mp3", b: "audio/track10-b.mp3" },
    ];
    // ─────────────────────────────────────────────────────────────────────────

    let currentIndex  = null;
    let activeVersion = 'a';     // which version is currently heard
    let isSeeking     = false;   // true while user drags the seek bar

    const audioA = new Audio();
    const audioB = new Audio();
    audioA.preload = 'auto';
    audioB.preload = 'auto';
    audioA.volume  = 0.8;
    audioB.volume  = 0.8;

    // ── Helpers ──────────────────────────────────────────────────────────────

    function activeAudio()   { return activeVersion === 'a' ? audioA : audioB; }
    function inactiveAudio() { return activeVersion === 'a' ? audioB : audioA; }

    function formatTime(secs) {
      if (!isFinite(secs) || isNaN(secs)) return '0:00';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ── Build track list ──────────────────────────────────────────────────────

    const listEl = document.getElementById('trackList');
    tracks.forEach((t, i) => {
      const li = document.createElement('li');
      li.id = `track-${i}`;
      li.innerHTML = `<span class="track-num">${i + 1}</span>${t.title}`;
      li.addEventListener('click', () => loadTrack(i));
      listEl.appendChild(li);
    });

    // ── Load a track ──────────────────────────────────────────────────────────

    function loadTrack(index) {
      const wasPlaying = currentIndex !== null && !activeAudio().paused;

      // Pause & unload both
      audioA.pause();
      audioB.pause();
      audioA.src = '';
      audioB.src = '';

      currentIndex  = index;
      activeVersion = 'a';

      const t = tracks[index];
      audioA.src = t.a;
      audioB.src = t.b;
      audioA.load();
      audioB.load();

      // Update track list highlight
      document.querySelectorAll('#trackList li').forEach(el => el.classList.remove('active'));
      document.getElementById(`track-${index}`).classList.add('active');

      // Update title & controls
      document.getElementById('trackTitle').textContent = t.title;
      enableControls(true);
      updateVersionUI();
      updateSeekBar(0, 0);

      if (wasPlaying) audioA.play();
      else updatePlayIcon(false);
    }

    // ── Play / Pause ──────────────────────────────────────────────────────────

    function togglePlay() {
      if (currentIndex === null) return;
      const a = activeAudio();
      if (a.paused) {
        a.play();
      } else {
        a.pause();
      }
    }

    // ── Version switch (the A/B toggle) ──────────────────────────────────────

    function switchVersion(version) {
      if (currentIndex === null || version === activeVersion) return;

      const current  = activeAudio();
      const next     = inactiveAudio();
      const wasPlaying = !current.paused;

      // Sync position
      next.currentTime = current.currentTime;
      current.pause();

      activeVersion = version;

      if (wasPlaying) {
        next.play();
      }
      updateVersionUI();
    }

    // ── Prev / Next ───────────────────────────────────────────────────────────

    function prevTrack() {
      if (currentIndex === null) return;
      const i = (currentIndex - 1 + tracks.length) % tracks.length;
      loadTrack(i);
      activeAudio().play();
    }

    function nextTrack() {
      if (currentIndex === null) return;
      const i = (currentIndex + 1) % tracks.length;
      loadTrack(i);
      activeAudio().play();
    }

    // ── Seek bar ──────────────────────────────────────────────────────────────

    function onSeekInput(val) {
      // While dragging, just update the time display (don't jump audio yet)
      isSeeking = true;
      const dur = activeAudio().duration || 0;
      document.getElementById('timeCurrent').textContent = formatTime((val / 100) * dur);
    }

    function onSeekChange(val) {
      // On release, jump both audio elements to keep them in sync
      const dur = activeAudio().duration;
      if (!dur) return;
      const t = (val / 100) * dur;
      audioA.currentTime = t;
      audioB.currentTime = t;
      isSeeking = false;
    }

    function updateSeekBar(current, duration) {
      const bar = document.getElementById('seekBar');
      bar.value = duration ? (current / duration) * 100 : 0;
      document.getElementById('timeCurrent').textContent = formatTime(current);
      document.getElementById('timeDuration').textContent = formatTime(duration);
    }

    // ── Volume ────────────────────────────────────────────────────────────────

    function setVolume(val) {
      audioA.volume = val;
      audioB.volume = val;
    }

    // ── UI updates ────────────────────────────────────────────────────────────

    function updatePlayIcon(playing) {
      document.getElementById('iconPlay').style.display  = playing ? 'none'  : 'block';
      document.getElementById('iconPause').style.display = playing ? 'block' : 'none';
    }

    function updateVersionUI() {
      document.getElementById('btnA').classList.toggle('selected', activeVersion === 'a');
      document.getElementById('btnB').classList.toggle('selected', activeVersion === 'b');
      document.getElementById('abHint').textContent =
        activeVersion === 'a' ? 'switch to B while playing to compare' : 'switch to A while playing to compare';
    }

    function enableControls(on) {
      ['btnPlay','btnPrev','btnNext','btnA','btnB','seekBar'].forEach(id => {
        document.getElementById(id).disabled = !on;
      });
    }

    // ── Audio event listeners ─────────────────────────────────────────────────

    [audioA, audioB].forEach(audio => {

      audio.addEventListener('play',  () => {
        if (audio === activeAudio()) updatePlayIcon(true);
      });

      audio.addEventListener('pause', () => {
        if (audio === activeAudio()) updatePlayIcon(false);
      });

      audio.addEventListener('ended', () => {
        if (audio === activeAudio()) {
          updatePlayIcon(false);
          nextTrack();
        }
      });

      audio.addEventListener('timeupdate', () => {
        if (audio !== activeAudio()) return;
        if (isSeeking) return;
        updateSeekBar(audio.currentTime, audio.duration);
      });

      audio.addEventListener('durationchange', () => {
        if (audio !== activeAudio()) return;
        updateSeekBar(audio.currentTime, audio.duration);
      });

    });
  </script>

</body>
</html>
